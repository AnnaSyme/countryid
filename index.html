<style>
:root{--bg:#f3f5f8;--card:#fff;--ink:#1f2733;--mut:#6b7686;--line:#e4e9f0;--accent:#2f6df0;--gold:#e7b53c}
*{box-sizing:border-box}
body{margin:0;font-family:'Noto Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto;padding:16px 14px 60px}
header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;text-align:left;padding:6px 0 10px}
header h1{font-size:19px;margin:0}
.ttl{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.subt{font-size:12px;color:var(--mut)}
.topbtns{display:flex;gap:6px;flex-shrink:0;align-items:center}
.srcwrap{position:relative}
.topb{font-family:inherit;font-size:11px;padding:4px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--mut);cursor:pointer;text-decoration:none;display:inline-block;line-height:1.4}
.topb:hover{background:#f4f6fa}
.srcpop{display:none;position:absolute;right:0;top:28px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:5px;box-shadow:0 4px 14px rgba(0,0,0,.08);z-index:10;min-width:108px}
.srcpop.show{display:block}
.aboutpop{left:0;right:auto;min-width:190px;max-width:250px}
.abouttxt{padding:6px 8px;font-size:12px;color:var(--ink);line-height:1.45}
.abouttxt a{color:var(--accent);text-decoration:none}
.abouttxt a:hover{text-decoration:underline}
.disc{margin-top:8px;color:var(--mut);font-size:11px}
.srcpop a{display:block;padding:5px 8px;color:var(--ink);text-decoration:none;font-size:13px;border-radius:6px}
.srcpop a:hover{background:#f4f6fa}
header p{margin:3px 0 0;color:var(--mut);font-size:13px}
.bar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:10px 0;font-size:12px}
.chip{background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 10px;color:var(--ink);cursor:default;display:inline-flex;gap:6px;align-items:center}
.chip b{font-weight:700}.chip span{color:#c0392b;font-weight:700}
.count{margin-left:auto;color:var(--mut);font-weight:700}
.prompt{font-size:16px;font-weight:700;margin:8px 2px 12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.tile{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:14px 10px;cursor:pointer;text-align:center;transition:.12s;display:flex;flex-direction:column;align-items:center;gap:8px;min-height:104px;justify-content:center}
.tile:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 18px rgba(40,80,160,.12)}
.tile .ic{width:58px;height:58px;display:flex;align-items:center;justify-content:center}
.tile .ic svg{width:100%;height:100%}
.tile .emoji{font-size:40px;line-height:1}
.tile .glyph{font-size:34px;line-height:1;font-family:'Noto Sans JP','Noto Sans KR','Noto Sans SC','Noto Sans Thai','Noto Sans Khmer','Noto Sans Lao','Noto Sans Sinhala','Noto Sans Tibetan','Noto Sans Devanagari','Noto Sans Bengali','Noto Sans Tamil','Noto Sans Telugu','Noto Sans Kannada','Noto Sans Malayalam','Noto Sans Gujarati','Noto Sans Gurmukhi',sans-serif}
.tile .lab{font-size:13.5px;font-weight:600;line-height:1.2}
.tile.pivot{background:#eef3fb;border-style:dashed;border-color:#bcd0f0}
.tile.nav{min-height:78px;background:#f4f6fa}
.grid.navrow{margin-top:4px}
.tile.nav.off{opacity:.4;pointer-events:none}
.tile.nav .ic{width:34px;height:34px}
.tile.pivot .ic{color:var(--accent)}
.tile.more{background:#f6f8fb;border-style:dashed}
.tile.result .ic{font-size:34px}
.flag{font-size:34px}
.foot{display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.btn{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer;color:var(--ink)}
.btn:hover{border-color:var(--accent)}
.btn.go{background:var(--accent);color:#fff;border-color:var(--accent)}
.detail{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px}
.detail h2{margin:0 0 2px;font-size:22px}
.detail .fl{font-size:46px}
.feat{display:flex;gap:10px;align-items:center;padding:7px 0;border-top:1px solid var(--line);font-size:14px}
.feat .ic{width:34px;height:34px;flex:0 0 34px}.feat .ic svg{width:100%;height:100%}
.links a{display:inline-block;margin:8px 8px 0 0;font-size:13px;color:var(--accent);text-decoration:none;border:1px solid #cdddf7;border-radius:8px;padding:6px 11px}
.hint{color:var(--mut);font-size:11px;margin-top:2px}
footer{text-align:center;color:var(--mut);font-size:11px;margin-top:26px}
footer a{color:var(--mut)}
</style></head>

function pushH(){hist.push(JSON.stringify({a:answered,f:focus,p:focusPage}));}
function goBack(){if(!hist.length)return;var s=JSON.parse(hist.pop());answered=s.a;focus=s.f;focusPage=s.p;recompute();render();}
function valuesPresent(f){var F=FACETS[f],counts={};cands.forEach(function(c){var a=ATTR[c][F.attr];if(a!=null)counts[a]=(counts[a]||0)+1;});return F.vals.filter(function(x){return counts[x.v];}).map(function(x){var o={};for(var k in x)o[k]=x[k];o.n=counts[x.v];return o;}).sort(function(a,b){return b.n-a.n;});}
function fineValues(){return FACETS.scriptFine.vals.filter(function(x){return x.cids.some(function(c){return cands.indexOf(c)>=0;});}).map(function(x){return{v:x.v,l:x.l,ic:x.ic};});}
function dynValues(f){var counts={};cands.forEach(function(c){var k=ATTR[c][f];if(k)counts[k]=(counts[k]||0)+1;});return Object.keys(counts).map(function(k){return{v:k,l:(f==='car'?(CARLABEL[k]||''):''),ic:k,n:counts[k]};}).sort(function(a,b){return b.n-a.n;});}
function useful(f){if(answered[f]!=null)return false;if(f==='scriptCG'){if(cands.some(function(c){return ATTR[c].scriptTop!=='cyrgreek';}))return false;var s={};cands.forEach(function(c){s[ATTR[c].script]=1;});return Object.keys(s).length>=2;}if(f==='scriptAH'){if(cands.some(function(c){return ATTR[c].scriptTop!=='arabheb';}))return false;var s={};cands.forEach(function(c){s[ATTR[c].script]=1;});return Object.keys(s).length>=2;}if(f==='asianSub'){if(cands.some(function(c){return ATTR[c].asianSub==null;}))return false;var s={};cands.forEach(function(c){s[ATTR[c].asianSub]=1;});return Object.keys(s).length>=2;}if(f==='scriptFine'){if(cands.some(function(c){return ATTR[c].asianSub==null;}))return false;var sub={};cands.forEach(function(c){sub[ATTR[c].asianSub]=1;});return Object.keys(sub).length<=1&&cands.length>1;}if(f==='bollard'||f==='car'){var d=dynValues(f),w=0;d.forEach(function(x){w+=x.n;});return d.length>=2||(d.length>=1&&w<cands.length);}var set={};cands.forEach(function(c){set[ATTR[c][FACETS[f].attr]]=1;});return Object.keys(set).length>=2;}
function gain(f){if(f==='scriptFine')return cands.length-1;if(f==='bollard'||f==='car'){var d=dynValues(f),w=0,mx=0;d.forEach(function(x){w+=x.n;if(x.n>mx)mx=x.n;});return cands.length-Math.max(mx,cands.length-w);}var counts={};cands.forEach(function(c){var a=ATTR[c][FACETS[f].attr];counts[a]=(counts[a]||0)+1;});var mx=0;for(var k in counts)if(counts[k]>mx)mx=counts[k];return cands.length-mx;}
function usefulFacets(){return ORDER.filter(useful).sort(function(a,b){return gain(b)-gain(a);});}
function applyValue(f,v){pushH();answered[f]=v;if(f==='bollard'||f==='car')cands=cands.filter(function(c){return ATTR[c][f]===v;});else if(f==='scriptFine'){var vv=FACETS.scriptFine.vals.filter(function(x){return x.v===v;})[0];cands=cands.filter(function(c){return vv.cids.indexOf(c)>=0;});}else cands=cands.filter(function(c){return ATTR[c][FACETS[f].attr]===v;});focus=null;if(f==='scriptTop')focus=(v==='cyrgreek')?'scriptCG':(v==='arabheb')?'scriptAH':(v==='asian')?'asianSub':null;else if(f==='asianSub')focus='scriptFine';focusPage=0;render();}
function setFocus(f){focus=f;focusPage=0;render();}
function recompute(){cands=ALL.slice();for(var f in answered){var v=answered[f];if(f==='bollard'||f==='car')cands=cands.filter(function(c){return ATTR[c][f]===v;});else cands=cands.filter((function(ff,vv){return function(c){return ATTR[c][FACETS[ff].attr]===vv;};})(f,v));}}
function undo(){if(!hist.length)return;var s=JSON.parse(hist.pop());answered=s.a;focus=s.f;focusPage=s.p;recompute();render();}
function removeAnswer(f){delete answered[f];focus=null;focusPage=0;recompute();render();}
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function valTile(f,x){var t=el('div','tile');t.appendChild(el('div','ic',iconHTML(x.ic)));if(x.l)t.appendChild(el('div','lab',x.l));t.onclick=function(){applyValue(f,x.v);};return t;}
function labelFor(f,v){return v;}
function pivotTile(f){var t=el('div','tile pivot');t.appendChild(el('div','ic',iconHTML(FACETS[f].dynamic?(FACETS[f].dynamic==='bollard'?'__e:\uD83D\uDEA7':'__e:\uD83D\uDE97'):(FACETS[f].vals?FACETS[f].vals[0].ic:''))));t.appendChild(el('div','lab',FACETS[f].q));t.onclick=function(){pushH();setFocus(f);};return t;}
function hubTile(f){return pivotTile(f);}
function moreTile(cb,lab){var t=el('div','tile more');t.appendChild(el('div','ic','<div class="emoji">\u22EF</div>'));t.appendChild(el('div','lab',lab));t.onclick=cb;return t;}
function render(){var hh=document.getElementById('hdr');if(hh)hh.style.display='';var app=document.getElementById('app');app.innerHTML='';
 // bar: chips + count
 var bar=el('div','bar');
 ORDER.forEach(function(f){if(answered[f]!=null){var lab=(f==='bollard'||f==='car')?FACETS[f].label:(prettyVal(f,answered[f]));var ch=el('span','chip','<b>'+lab+'</b>');bar.appendChild(ch);}});
 if(Object.keys(answered).length>0)bar.appendChild(el('span','count',cands.length+' countr'+(cands.length===1?'y':'ies')+' left'));
 app.appendChild(bar);
 var uf=usefulFacets();
 if(focus==='__results'){return showResults(app,uf);}
 if(focus==='__hub'&&uf.length>0){
   app.appendChild(el('div','prompt','What can you see?'));
   var hb=HUBORDER.filter(function(f){return uf.indexOf(f)>=0;}).concat(uf.filter(function(f){return HUBORDER.indexOf(f)<0;}));var g=el('div','grid');hb.slice(0,8).forEach(function(f){g.appendChild(hubTile(f));});app.appendChild(g);navRow(app);return;
 }
 if(cands.length<=1||uf.length===0){return showResults(app,uf);}
 var f=(focus&&focus!=='__hub'&&uf.indexOf(focus)>=0)?focus:uf[0];
 var vals=(f==='scriptFine')?fineValues():(FACETS[f].dynamic?dynValues(f):valuesPresent(f));
 var per=(vals.length<=8)?vals.length:7,pages=Math.ceil(vals.length/per);
 var g=el('div','grid');var tiles=[];
  if(focusPage>=pages){
   app.appendChild(el('div','prompt','None of those? Pick a different clue.'));
 }else{
   app.appendChild(el('div','prompt',FACETS[f].prompt));
   var show=vals.slice(focusPage*per,focusPage*per+per);
   show.forEach(function(x){tiles.push(valTile(f,x));});
   if(pages>1)tiles.push(moreTile(function(){pushH();focusPage=focusPage+1;render();},focusPage===pages-1?'None of these':'More options'));
 }
 tiles.forEach(function(t){g.appendChild(t);});app.appendChild(g);navRow(app);
}
function prettyVal(f,v){var F=FACETS[f];if(F.vals){var m=F.vals.filter(function(x){return x.v===v;});if(m.length)return m[0].l;}return v;}
function navTile(lab,ic,cb){var t=el('div','tile pivot nav');t.appendChild(el('div','ic',iconHTML(ic)));t.appendChild(el('div','lab',lab));t.onclick=cb;return t;}
function navRow(app){var g=el('div','grid navrow');g.appendChild(navTile('Show the '+cands.length+' matches','__e:\uD83D\uDCCB',function(){pushH();setFocus('__results');}));var se=navTile('Something else','__e:\u21AA\uFE0F',function(){pushH();setFocus('__hub');});if(focus==='__hub')se.className+=' off';g.appendChild(se);var bk=navTile('Back','__e:\u2B05\uFE0F',goBack);if(!hist.length)bk.className+=' off';g.appendChild(bk);g.appendChild(navTile('Restart','__e:\uD83D\uDD04',reset));app.appendChild(g);}
function showResults(app,uf){
 app.appendChild(el('div','prompt',cands.length===1?'It looks like:':(cands.length+' close matches — pick one to confirm:')));
 var g=el('div','grid');
 cands.forEach(function(c){var t=el('div','tile result');t.appendChild(el('div','ic flag',CO[c].flag||'\uD83C\uDFF3\uFE0F'));t.appendChild(el('div','lab',CO[c].name));var _tl=(CO[c].feats&&CO[c].feats[0])?CO[c].feats[0].text:'';if(_tl)t.appendChild(el('div','hint',_tl));t.onclick=(function(cc){return function(){pushH();detail(cc);};})(c);g.appendChild(t);});
 app.appendChild(g);
 var ng=el('div','grid');
 if(hist.length)ng.appendChild(navTile('Back','__e:\u2B05\uFE0F',goBack));
 ng.appendChild(navTile('Restart','__e:\uD83D\uDD04',reset));app.appendChild(ng);
}
function detail(c){var hh=document.getElementById('hdr');if(hh)hh.style.display='none';var app=document.getElementById('app');app.innerHTML='';var co=CO[c];var d=el('div','detail');
 d.appendChild(el('div','fl',co.flag||''));d.appendChild(el('h2',null,co.name));
 (co.feats||[]).forEach(function(ft){var row=el('div','feat');row.appendChild(el('div','ic',iconHTML(ft.icon)));row.appendChild(el('div',null,ft.text));d.appendChild(row);});
 var lk=el('div','links');if(co.plonkit)lk.innerHTML+='<a target="_blank" rel="noopener" href="https://www.plonkit.net/'+co.plonkit+'">Plonkit guide \u2197</a>';if(co.geometas)lk.innerHTML+='<a target="_blank" rel="noopener" href="https://geometas.com/country/'+co.geometas+'">geometas \u2197</a>';if(co.wiki)lk.innerHTML+='<a target="_blank" rel="noopener" href="https://en.wikipedia.org/wiki/'+co.wiki+'">Wikipedia \u2197</a>';d.appendChild(lk);
 d.appendChild(el('div','hint','Clues adapted from plonkit.net & geometas.com'));
 app.appendChild(d);
 var ng=el('div','grid');ng.appendChild(navTile('Back','__e:\u2B05\uFE0F',goBack));ng.appendChild(navTile('Restart','__e:\uD83D\uDD04',reset));app.appendChild(ng);
}
function closePops(){document.querySelectorAll('.srcpop.show').forEach(function(p){p.classList.remove('show');});}
function togglePop(id){var t=document.getElementById(id),open=t&&t.classList.contains('show');closePops();if(t&&!open)t.classList.add('show');}
document.addEventListener('click',function(e){if(!e.target.closest('.srcwrap'))closePops();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePops();});
reset();
</script></body></html>
